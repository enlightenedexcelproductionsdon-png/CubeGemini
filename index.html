```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Cube</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: sans-serif; }
        canvas { display: block; }
        .ui-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            pointer-events: auto;
        }
        .controls-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.7rem;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="ui-overlay bg-slate-900/60 backdrop-blur-sm p-3 rounded-lg border border-white/10 text-white shadow-xl w-48">
        <h1 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
            Cube Engine
        </h1>
        
        <div class="space-y-3">
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-[9px] uppercase font-bold text-slate-500">Speed</label>
                </div>
                <input type="range" id="speedRange" min="0" max="0.1" step="0.001" value="0.01" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>

            <div>
                <label class="text-[9px] uppercase font-bold text-slate-500 mb-1.5 block">Hue</label>
                <div class="flex gap-1.5">
                    <button onclick="changeColor(0x60a5fa)" class="w-4 h-4 rounded-sm bg-blue-400 hover:scale-110 transition-transform"></button>
                    <button onclick="changeColor(0x34d399)" class="w-4 h-4 rounded-sm bg-emerald-400 hover:scale-110 transition-transform"></button>
                    <button onclick="changeColor(0xf472b6)" class="w-4 h-4 rounded-sm bg-pink-400 hover:scale-110 transition-transform"></button>
                    <button onclick="changeColor(0xfbbf24)" class="w-4 h-4 rounded-sm bg-amber-400 hover:scale-110 transition-transform"></button>
                </div>
            </div>

            <div class="pt-2 border-t border-white/5">
                <label class="flex items-center justify-between cursor-pointer group">
                    <span class="text-[9px] uppercase font-bold text-slate-500 group-hover:text-slate-300 transition-colors">Wireframe</span>
                    <div class="relative">
                        <input type="checkbox" id="wireframeToggle" class="sr-only peer">
                        <div class="w-6 h-3 bg-slate-800 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                        <div class="absolute top-0.5 left-0.5 w-2 h-2 bg-white rounded-full transition-transform peer-checked:translate-x-3"></div>
                    </div>
                </label>
            </div>
        </div>
    </div>

    <div class="controls-hint">
        Drag • Scroll • Interaction Active
    </div>

    <script>
        let scene, camera, renderer, cube, edges;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationSpeed = 0.01;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x60a5fa,
                shininess: 100,
                specular: 0x444444
            });

            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            const edgeGeometry = new THREE.EdgesGeometry(geometry);
            const edgeMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
            edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
            cube.add(edges);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize, false);
            
            document.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('wheel', handleZoom);

            document.getElementById('speedRange').addEventListener('input', (e) => {
                rotationSpeed = parseFloat(e.target.value);
            });

            document.getElementById('wireframeToggle').addEventListener('change', (e) => {
                cube.material.wireframe = e.target.checked;
            });

            animate();
        }

        function changeColor(colorHex) {
            cube.material.color.setHex(colorHex);
        }

        function handleMouseMove(e) {
            const deltaMove = {
                x: e.offsetX - previousMousePosition.x,
                y: e.offsetY - previousMousePosition.y
            };

            if (isDragging) {
                const deltaRotationQuaternion = new THREE.Quaternion()
                    .setFromEuler(new THREE.Euler(
                        toRadians(deltaMove.y * 0.5),
                        toRadians(deltaMove.x * 0.5),
                        0,
                        'XYZ'
                    ));
                
                cube.quaternion.multiplyQuaternions(deltaRotationQuaternion, cube.quaternion);
            }
            
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        }

        function handleZoom(e) {
            camera.position.z += e.deltaY * 0.005;
            camera.position.z = Math.max(2, Math.min(10, camera.position.z));
        }

        function toRadians(angle) {
            return angle * (Math.PI / 180);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) {
                cube.rotation.x += rotationSpeed;
                cube.rotation.y += rotationSpeed;
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
